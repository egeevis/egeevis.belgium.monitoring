<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇧🇪 Belçika İzleme Paneli</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff; --bg2: #f8f7f4; --bg3: #f0efe9;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --text: #1a1a18; --text2: #6b6a65; --text3: #9b9a95;
    --green: #0F6E56; --green-mid: #1D9E75;
    --info-bg: #E6F1FB; --info-text: #0C447C;
    --success-bg: #EAF3DE; --success-text: #3B6D11;
    --radius: 10px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #252523; --bg3: #2c2c2a;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --text: #f0efea; --text2: #a0a09a; --text3: #6a6a64;
      --info-bg: #042C53; --info-text: #B5D4F4;
      --success-bg: #173404; --success-text: #C0DD97;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg3); color: var(--text);
    min-height: 100vh; padding: 24px 16px 48px;
  }
  .container { max-width: 820px; margin: 0 auto; }

  .header {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 18px 22px;
    margin-bottom: 14px; display: flex; align-items: center; gap: 14px;
  }
  .header-flag { font-size: 34px; line-height: 1; }
  .header-text h1 { font-size: 19px; font-weight: 600; }
  .header-text p { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .header-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .free-badge {
    background: var(--success-bg); color: var(--success-text);
    font-size: 11px; font-weight: 600; padding: 3px 9px;
    border-radius: var(--radius-sm); display: flex; align-items: center; gap: 4px;
  }
  .updated-lbl { font-size: 11px; color: var(--text3); }

  .cats { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 14px; }
  @media (max-width: 520px) { .cats { grid-template-columns: 1fr; } }

  .cat {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 15px 17px;
    cursor: pointer; text-align: left;
    transition: border-color .15s, background .15s, transform .1s;
    position: relative;
  }
  .cat:hover { border-color: var(--border2); background: var(--bg2); transform: translateY(-1px); }
  .cat:active { transform: translateY(0); }
  .cat.active { border: 2px solid var(--green-mid); }
  .cat-icon { font-size: 22px; color: var(--green-mid); display: block; margin-bottom: 7px; }
  .cat-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .cat-desc { font-size: 11px; color: var(--text2); line-height: 1.4; }
  .cat-count {
    position: absolute; top: 10px; right: 10px;
    background: var(--info-bg); color: var(--info-text);
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 20px;
  }

  .panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 19px; border-bottom: 0.5px solid var(--border);
    background: var(--bg2); gap: 8px; flex-wrap: wrap;
  }
  .panel-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .panel-meta { font-size: 11px; color: var(--text3); }
  .sort-btns { display: flex; gap: 4px; margin-left: auto; }
  .sort-btn {
    font-size: 11px; padding: 3px 9px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border); background: var(--bg2);
    color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 3px;
  }
  .sort-btn:hover { background: var(--bg3); }
  .sort-btn.on { background: var(--info-bg); color: var(--info-text); border-color: transparent; font-weight: 600; }
  .count-pill {
    background: var(--info-bg); color: var(--info-text);
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
  }
  .panel-body { padding: 15px 19px; min-height: 160px; }

  .state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px; gap: 10px; text-align: center; }
  .state i { font-size: 34px; opacity: .25; }
  .state p { font-size: 13px; color: var(--text2); line-height: 1.5; }

  .src-name {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .07em; color: var(--text3);
    padding: 11px 0 5px; border-top: 0.5px solid var(--border);
    display: flex; align-items: center; gap: 5px;
  }
  .src-name:first-child { border-top: none; padding-top: 0; }
  .src-cnt { background: var(--bg3); color: var(--text2); font-size: 9px; padding: 1px 5px; border-radius: 10px; }

  .item { padding: 8px 0; border-bottom: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
  .item:last-child { border-bottom: none; }
  .item a { font-size: 13px; color: var(--text); text-decoration: none; line-height: 1.45; font-weight: 500; }
  .item a:hover { color: var(--green-mid); text-decoration: underline; }
  .item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .item-date { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 3px; }
  .item-source { font-size: 10px; background: var(--bg3); color: var(--text2); padding: 1px 6px; border-radius: 4px; }

  .no-data { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; }

  .footer { margin-top: 16px; text-align: center; font-size: 11px; color: var(--text3); display: flex; align-items: center; justify-content: center; gap: 6px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="header-flag">🇧🇪</span>
    <div class="header-text">
      <h1>Belçika İzleme Paneli</h1>
      <p>Her 30 dakikada otomatik güncellenir — proxy yok, anında açılır</p>
    </div>
    <div class="header-right">
      <div class="free-badge"><i class="ti ti-currency-dollar-off"></i> Ücretsiz</div>
      <span class="updated-lbl" id="updated-lbl">—</span>
    </div>
  </div>

  <div class="cats">
    <button class="cat" id="btn-nuclear" onclick="show('nuclear')">
      <i class="ti ti-atom cat-icon"></i>
      <div class="cat-title">Nükleer Santraller</div>
      <div class="cat-desc">Doel &amp; Tihange reaktörleri, FANC, enerji politikası</div>
      <span class="cat-count" id="cnt-nuclear">—</span>
    </button>
    <button class="cat" id="btn-airspace" onclick="show('airspace')">
      <i class="ti ti-plane cat-icon"></i>
      <div class="cat-title">Hava Sahası</div>
      <div class="cat-desc">Belçika hava sahası, Brüksel ATC, askeri aktivite, NOTAM</div>
      <span class="cat-count" id="cnt-airspace">—</span>
    </button>
    <button class="cat" id="btn-officials" onclick="show('officials')">
      <i class="ti ti-speakerphone cat-icon"></i>
      <div class="cat-title">Resmi Açıklamalar</div>
      <div class="cat-desc">Başbakan De Wever, Dışişleri Bakanı Lahbib, Savunma Bakanı Francken</div>
      <span class="cat-count" id="cnt-officials">—</span>
    </button>
    <button class="cat" id="btn-parliament" onclick="show('parliament')">
      <i class="ti ti-building-bank cat-icon"></i>
      <div class="cat-title">Parlamento Kararları</div>
      <div class="cat-desc">Federal, Flaman, Valon, Brüksel, Alman Topluluk ve Avrupa</div>
      <span class="cat-count" id="cnt-parliament">—</span>
    </button>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" id="panel-title"><i class="ti ti-news"></i> Haberler</span>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span class="panel-meta" id="panel-meta">Bir kategori seçin</span>
        <div class="sort-btns">
          <button class="sort-btn on" id="sort-date" onclick="setSort('date')"><i class="ti ti-calendar-down" style="font-size:12px"></i> Tarihe göre</button>
          <button class="sort-btn" id="sort-src" onclick="setSort('source')"><i class="ti ti-rss" style="font-size:12px"></i> Kaynağa göre</button>
        </div>
      </div>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="state">
        <i class="ti ti-hand-click"></i>
        <p>Yukarıdaki kategorilerden birine tıklayın.</p>
      </div>
    </div>
  </div>

  <div class="footer">
    <i class="ti ti-refresh"></i> Her 30 dakikada GitHub Actions tarafından güncellenir &nbsp;·&nbsp;
    <i class="ti ti-rss"></i> RSS tabanlı
  </div>
</div>

<script>
const CAT_META = {
  nuclear:    { label: "Nükleer Santraller", icon: "ti-atom" },
  airspace:   { label: "Hava Sahası",        icon: "ti-plane" },
  officials:  { label: "Resmi Açıklamalar",  icon: "ti-speakerphone" },
  parliament: { label: "Parlamento Kararları",icon: "ti-building-bank" },
};

let DB = null;
let current = null;
let sortMode = "date";

function fmtDate(str) {
  if (!str) return "";
  try {
    return new Date(str).toLocaleDateString("tr-TR", { day:"2-digit", month:"short", year:"numeric" });
  } catch { return ""; }
}

function fmtUpdated(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    return "Güncellendi: " + d.toLocaleString("tr-TR", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
  } catch { return ""; }
}

async function init() {
  try {
    const resp = await fetch("data.json?t=" + Date.now());
    if (!resp.ok) throw new Error("data.json bulunamadı");
    DB = await resp.json();

    document.getElementById("updated-lbl").textContent = fmtUpdated(DB.updated);

    // Kategori rozetlerini doldur
    for (const cat of Object.keys(CAT_META)) {
      const catData = DB.data[cat] || {};
      const total = Object.values(catData).reduce((s, arr) => s + arr.length, 0);
      const el = document.getElementById("cnt-" + cat);
      if (el) el.textContent = total > 0 ? total : "0";
    }

    // İlk kategoriyi otomatik aç
    show("nuclear");

  } catch (e) {
    document.getElementById("panel-body").innerHTML = `
      <div class="state">
        <i class="ti ti-alert-circle" style="color:#E24B4A;opacity:.7"></i>
        <p><strong>data.json yüklenemedi.</strong><br>
        GitHub Actions henüz çalışmamış olabilir.<br>
        Reponuzda Actions sekmesine gidin ve workflow'u manuel başlatın.</p>
      </div>`;
  }
}

function setSort(mode) {
  sortMode = mode;
  document.getElementById("sort-date").classList.toggle("on", mode === "date");
  document.getElementById("sort-src").classList.toggle("on", mode === "source");
  if (current) show(current);
}

function allItemsSorted(catData) {
  // flatten all items with source label, sort by date desc
  let items = [];
  for (const [srcName, arr] of Object.entries(catData)) {
    for (const item of arr) items.push({...item, _src: srcName});
  }
  items.sort((a, b) => new Date(b.date||0) - new Date(a.date||0));
  return items;
}

function show(cat) {
  if (!DB) return;
  current = cat;
  document.querySelectorAll(".cat").forEach(b => b.classList.remove("active"));
  document.getElementById("btn-" + cat).classList.add("active");

  const meta = CAT_META[cat];
  const catData = DB.data[cat] || {};
  const total = Object.values(catData).reduce((s, arr) => s + arr.length, 0);

  document.getElementById("panel-title").innerHTML =
    `<i class="ti ${meta.icon}"></i> ${meta.label} <span class="count-pill">${total}</span>`;
  document.getElementById("panel-meta").textContent = fmtUpdated(DB.updated);

  if (total === 0) {
    document.getElementById("panel-body").innerHTML =
      `<div class="no-data"><i class="ti ti-mood-empty" style="font-size:28px;opacity:.3;display:block;margin-bottom:8px"></i>Bu kategori için henüz haber yok.</div>`;
    return;
  }

  let html = "";
  if (sortMode === "date") {
    // Tüm haberler tarihe göre karışık, kaynak etiketi eklenerek
    const flat = allItemsSorted(catData);
    for (const item of flat) {
      const title = (item.title||"Başlıksız").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const date  = fmtDate(item.date);
      const src   = (item.source||item._src||"").replace(/</g,"&lt;");
      html += `<div class="item">
        <a href="${item.link||'#'}" target="_blank" rel="noopener noreferrer">${title}</a>
        <div class="item-meta">
          ${date ? `<span class="item-date"><i class="ti ti-calendar" style="font-size:10px"></i>${date}</span>` : ""}
          ${src  ? `<span class="item-source">${src}</span>` : ""}
        </div>
      </div>`;
    }
  } else {
    // Kaynağa göre gruplu
    for (const [srcName, items] of Object.entries(catData)) {
      if (!items || items.length === 0) continue;
      html += `<div class="src-name"><i class="ti ti-rss" style="font-size:11px"></i>${srcName}<span class="src-cnt">${items.length}</span></div>`;
      for (const item of items) {
        const title = (item.title||"Başlıksız").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        const date  = fmtDate(item.date);
        const src   = (item.source||"").replace(/</g,"&lt;");
        html += `<div class="item">
          <a href="${item.link||'#'}" target="_blank" rel="noopener noreferrer">${title}</a>
          <div class="item-meta">
            ${date ? `<span class="item-date"><i class="ti ti-calendar" style="font-size:10px"></i>${date}</span>` : ""}
            ${src  ? `<span class="item-source">${src}</span>` : ""}
          </div>
        </div>`;
      }
    }
  }
  document.getElementById("panel-body").innerHTML = html;
}

init();
</script>
</body>
</html>
