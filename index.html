<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇧🇪 Belçika İzleme Paneli</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f8f7f4;
    --bg3: #f0efe9;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #9b9a95;
    --green: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #1D9E75;
    --green-text: #085041;
    --info-bg: #E6F1FB;
    --info-text: #0C447C;
    --success-bg: #EAF3DE;
    --success-text: #3B6D11;
    --radius: 10px;
    --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #252523;
      --bg3: #2c2c2a;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --text: #f0efea;
      --text2: #a0a09a;
      --text3: #6a6a64;
      --green-light: #04342C;
      --green-text: #9FE1CB;
      --info-bg: #042C53;
      --info-text: #B5D4F4;
      --success-bg: #173404;
      --success-text: #C0DD97;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }
  .container { max-width: 820px; margin: 0 auto; }

  /* Header */
  .header {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-flag { font-size: 36px; line-height: 1; }
  .header-text h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  .header-text p { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .header-badge {
    margin-left: auto;
    background: var(--success-bg);
    color: var(--success-text);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }

  /* Category grid */
  .cats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  @media (max-width: 520px) { .cats { grid-template-columns: 1fr; } }

  .cat {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s, transform .1s;
    position: relative;
  }
  .cat:hover { border-color: var(--border2); background: var(--bg2); transform: translateY(-1px); }
  .cat:active { transform: translateY(0); }
  .cat.active { border: 2px solid var(--green-mid); }
  .cat.loading { opacity: .6; pointer-events: none; }
  .cat-icon {
    font-size: 24px;
    color: var(--green-mid);
    display: block;
    margin-bottom: 8px;
  }
  .cat-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .cat-desc { font-size: 12px; color: var(--text2); line-height: 1.45; }

  /* Results panel */
  .panel {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg2);
    gap: 8px;
    flex-wrap: wrap;
  }
  .panel-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-meta { font-size: 11px; color: var(--text3); }
  .count-pill {
    background: var(--info-bg);
    color: var(--info-text);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .panel-body { padding: 16px 20px; min-height: 180px; }

  /* States */
  .state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 150px;
    gap: 12px;
    text-align: center;
  }
  .state i { font-size: 36px; opacity: .3; }
  .state p { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .spinner {
    width: 32px; height: 32px;
    border: 2.5px solid var(--border);
    border-top-color: var(--green-mid);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin-label { font-size: 12px; color: var(--text2); }

  /* Source sections */
  .src-section { margin-bottom: 4px; }
  .src-name {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text3);
    padding: 12px 0 6px;
    border-top: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .src-name:first-child { border-top: none; padding-top: 0; }
  .src-count {
    background: var(--bg3);
    color: var(--text2);
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 10px;
  }

  /* News items */
  .item {
    padding: 9px 0;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .item:last-child { border-bottom: none; }
  .item a {
    font-size: 13.5px;
    color: var(--text);
    text-decoration: none;
    line-height: 1.45;
    font-weight: 500;
  }
  .item a:hover { color: var(--green-mid); text-decoration: underline; }
  .item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .item-date { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 3px; }
  .item-source {
    font-size: 10px;
    background: var(--bg3);
    color: var(--text2);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* Error */
  .error-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 130px; gap: 10px; text-align: center;
  }
  .error-state i { font-size: 28px; color: #E24B4A; opacity: .7; }
  .error-state p { font-size: 13px; color: var(--text2); }
  .retry-btn {
    font-size: 12px;
    padding: 6px 16px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .retry-btn:hover { background: var(--bg3); }

  /* Footer */
  .footer {
    margin-top: 20px;
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="header-flag">🇧🇪</span>
    <div class="header-text">
      <h1>Belçika İzleme Paneli</h1>
      <p>Kategori seçin — Google News RSS'den anlık haberler</p>
    </div>
    <div class="header-badge">
      <i class="ti ti-currency-dollar-off"></i> Tamamen Ücretsiz
    </div>
  </div>

  <div class="cats">
    <button class="cat" id="btn-nuclear" onclick="loadCat('nuclear')">
      <i class="ti ti-atom cat-icon"></i>
      <div class="cat-title">Nükleer Santraller</div>
      <div class="cat-desc">Doel &amp; Tihange reaktörleri, FANC denetimleri, enerji politikası kararları</div>
    </button>
    <button class="cat" id="btn-airspace" onclick="loadCat('airspace')">
      <i class="ti ti-plane cat-icon"></i>
      <div class="cat-title">Hava Sahası</div>
      <div class="cat-desc">Belçika hava sahası, Brüksel ATC, askeri uçuş aktiviteleri, NOTAM</div>
    </button>
    <button class="cat" id="btn-officials" onclick="loadCat('officials')">
      <i class="ti ti-speakerphone cat-icon"></i>
      <div class="cat-title">Resmi Açıklamalar</div>
      <div class="cat-desc">Başbakan De Wever, Dışişleri Bakanı Lahbib, Savunma Bakanı Francken</div>
    </button>
    <button class="cat" id="btn-parliament" onclick="loadCat('parliament')">
      <i class="ti ti-building-bank cat-icon"></i>
      <div class="cat-title">Parlamento Kararları</div>
      <div class="cat-desc">Federal, Flaman, Valon, Brüksel, Alman Topluluk ve Avrupa parlamentoları</div>
    </button>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" id="panel-title">
        <i class="ti ti-news"></i> Haberler
      </span>
      <span class="panel-meta" id="panel-meta">Bir kategori seçin</span>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="state">
        <i class="ti ti-hand-click"></i>
        <p>Yukarıdaki dört kategoriden birine tıklayın.<br>Google News'ten gerçek zamanlı haberler gelecek.</p>
      </div>
    </div>
  </div>

  <div class="footer">
    <i class="ti ti-rss"></i>
    RSS tabanlı &nbsp;·&nbsp; Hiç API yok &nbsp;·&nbsp; Hiç ücret yok
  </div>
</div>

<script>
// RSS'i XML olarak çekip parse eden yardımcı — allorigins proxy üzerinden
async function fetchRSS(feedUrl) {
  const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(feedUrl);
  const resp = await fetch(proxy);
  if (!resp.ok) throw new Error("proxy error");
  const json = await resp.json();
  const xml = json.contents;
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, "text/xml");
  const items = [];
  doc.querySelectorAll("item").forEach(el => {
    const title   = el.querySelector("title")?.textContent || "";
    const link    = el.querySelector("link")?.textContent
                 || el.querySelector("link")?.getAttribute("href") || "#";
    const pubDate = el.querySelector("pubDate")?.textContent || "";
    const source  = el.querySelector("source")?.textContent || "";
    items.push({ title, link, pubDate, author: source });
  });
  return items;
}

const CATS = {
  nuclear: {
    label: "Nükleer Santraller",
    icon: "ti-atom",
    feeds: [
      { name: "Google News (FR) — Nucléaire Belgique",    url: "https://news.google.com/rss/search?q=nucl%C3%A9aire+Belgique+Doel+Tihange&hl=fr&gl=BE&ceid=BE:fr" },
      { name: "Google News (EN) — Nuclear Belgium",       url: "https://news.google.com/rss/search?q=nuclear+Belgium+Doel+Tihange+FANC&hl=en&gl=BE&ceid=BE:en" },
      { name: "Google News (NL) — Kernenergie België",    url: "https://news.google.com/rss/search?q=kernenergie+Belgi%C3%AB+Doel+Tihange&hl=nl&gl=BE&ceid=BE:nl" }
    ]
  },
  airspace: {
    label: "Hava Sahası",
    icon: "ti-plane",
    feeds: [
      { name: "Google News (FR) — Espace aérien Belgique", url: "https://news.google.com/rss/search?q=espace+a%C3%A9rien+Belgique+aviation&hl=fr&gl=BE&ceid=BE:fr" },
      { name: "Google News (EN) — Belgium airspace",       url: "https://news.google.com/rss/search?q=Belgium+airspace+aviation+military+Brussels&hl=en&gl=BE&ceid=BE:en" },
      { name: "Google News (FR) — Drone Kleine-Brogel",   url: "https://news.google.com/rss/search?q=Belgique+drone+espace+a%C3%A9rien+Kleine-Brogel&hl=fr&gl=BE&ceid=BE:fr" }
    ]
  },
  officials: {
    label: "Resmi Açıklamalar",
    icon: "ti-speakerphone",
    feeds: [
      { name: "Google News (FR) — De Wever premier",         url: "https://news.google.com/rss/search?q=De+Wever+premier+Belgique+d%C3%A9claration&hl=fr&gl=BE&ceid=BE:fr" },
      { name: "Google News (FR) — Lahbib affaires étrang.",  url: "https://news.google.com/rss/search?q=Lahbib+affaires+%C3%A9trang%C3%A8res+Belgique&hl=fr&gl=BE&ceid=BE:fr" },
      { name: "Google News (FR) — Francken défense",         url: "https://news.google.com/rss/search?q=Francken+ministre+d%C3%A9fense+Belgique&hl=fr&gl=BE&ceid=BE:fr" },
      { name: "Google News (EN) — Belgium government",       url: "https://news.google.com/rss/search?q=Belgium+prime+minister+defence+foreign+minister+statement&hl=en&gl=BE&ceid=BE:en" }
    ]
  },
  parliament: {
    label: "Parlamento Kararları",
    icon: "ti-building-bank",
    feeds: [
      { name: "Google News (FR) — Chambre fédérale",       url: "https://news.google.com/rss/search?q=Chambre+repr%C3%A9sentants+Belgique+vote+loi&hl=fr&gl=BE&ceid=BE:fr" },
      { name: "Google News (FR) — Parlement wallon",        url: "https://news.google.com/rss/search?q=parlement+wallon+r%C3%A9solution+d%C3%A9cret&hl=fr&gl=BE&ceid=BE:fr" },
      { name: "Google News (NL) — Vlaams Parlement",        url: "https://news.google.com/rss/search?q=Vlaams+Parlement+decreet+stemming&hl=nl&gl=BE&ceid=BE:nl" },
      { name: "Google News (FR) — Parlement bruxellois",    url: "https://news.google.com/rss/search?q=parlement+bruxellois+ordonnance+vote&hl=fr&gl=BE&ceid=BE:fr" },
      { name: "Google News (NL) — Europees Parlement / BE", url: "https://news.google.com/rss/search?q=Europees+Parlement+Belgi%C3%AB+Europarlementariers&hl=nl&gl=BE&ceid=BE:nl" }
    ]
  }
};

let current = null;

function fmtDate(str) {
  if (!str) return "";
  try {
    const d = new Date(str);
    return d.toLocaleDateString("tr-TR", { day: "2-digit", month: "short", year: "numeric" });
  } catch { return ""; }
}

async function loadCat(cat) {
  if (current === cat) return;
  current = cat;

  document.querySelectorAll('.cat').forEach(b => b.classList.remove('active', 'loading'));
  const btn = document.getElementById('btn-' + cat);
  btn.classList.add('active', 'loading');

  const cfg = CATS[cat];
  document.getElementById('panel-title').innerHTML = `<i class="ti ${cfg.icon}"></i> ${cfg.label}`;
  document.getElementById('panel-meta').textContent = "Yükleniyor…";
  document.getElementById('panel-body').innerHTML = `
    <div class="state">
      <div class="spinner"></div>
      <p class="spin-label">RSS beslemeleri çekiliyor…</p>
    </div>`;

  const allResults = {};
  await Promise.all(cfg.feeds.map(async (feed) => {
    try {
      const items = await fetchRSS(feed.url);
      if (items.length > 0) allResults[feed.name] = items.slice(0, 8);
    } catch (e) { /* kaynağa ulaşılamadı */ }
  }));

  btn.classList.remove('loading');

  const totalItems = Object.values(allResults).reduce((sum, arr) => sum + arr.length, 0);
  const now = new Date().toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" });

  document.getElementById('panel-title').innerHTML =
    `<i class="ti ${cfg.icon}"></i> ${cfg.label} <span class="count-pill">${totalItems}</span>`;
  document.getElementById('panel-meta').textContent = `Son güncelleme: ${now}`;

  if (totalItems === 0) {
    document.getElementById('panel-body').innerHTML = `
      <div class="error-state">
        <i class="ti ti-wifi-off"></i>
        <p>Sonuç alınamadı. İnternet bağlantınızı kontrol edin<br>veya birkaç saniye sonra tekrar deneyin.</p>
        <button class="retry-btn" onclick="current=null; loadCat('${cat}')">
          <i class="ti ti-refresh"></i> Tekrar Dene
        </button>
      </div>`;
    return;
  }

  let html = "";
  for (const [srcName, items] of Object.entries(allResults)) {
    html += `<div class="src-section">
      <div class="src-name">
        <i class="ti ti-rss" style="font-size:11px"></i>
        ${srcName}
        <span class="src-count">${items.length}</span>
      </div>`;
    for (const item of items) {
      const title = (item.title || "Başlıksız").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const link  = item.link || "#";
      const date  = fmtDate(item.pubDate);
      const src   = (item.author || "").replace(/</g,"&lt;");
      html += `<div class="item">
        <a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a>
        <div class="item-meta">
          ${date ? `<span class="item-date"><i class="ti ti-calendar" style="font-size:11px"></i> ${date}</span>` : ""}
          ${src  ? `<span class="item-source">${src}</span>` : ""}
        </div>
      </div>`;
    }
    html += `</div>`;
  }
  document.getElementById('panel-body').innerHTML = html;
}
</script>
</body>
</html>
